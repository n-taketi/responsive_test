<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vue Responsive Sample (Apple対応2)</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
body{font-family:sans-serif;margin:20px;}
.card-box{padding:15px;border-radius:8px;border:1px solid #ccc;}
.mobile{background:#eef;}
.tablet{background:#ffe;}
.pc{background:#efe;}
</style>
</head>

<body>
<div id="app">

  <h1>🍏 apple対応2</h1>

  <h2>画面幅：{{ width }}px（判定：{{ deviceType }}）</h2>

  <div class="container">
    <div class="row g-3">

      <!-- UI 切り替え -->
      <div class="col-12 col-md-6">
        <div class="card-box" :class="deviceType">
          <h3>UI 切り替え</h3>
          <p v-if="deviceType === 'mobile'">これはスマホ向けの表示です。</p>
          <p v-else-if="deviceType === 'tablet'">これはタブレット向けの表示です。</p>
          <p v-else>これはPC向けの表示です。</p>
        </div>
      </div>

      <!-- コンポーネント切り替え -->
      <div class="col-12 col-md-6">
        <component :is="componentName"></component>
      </div>

    </div>
  </div>

</div>

<script>
const MobileCard = {
  template: `
    <div class="card-box mobile">
      <h3>スマホ用コンポーネント</h3>
      <p>画面幅が狭いので簡易表示です。</p>
    </div>
  `
}

const TabletCard = {
  template: `
    <div class="card-box tablet">
      <h3>タブレット用コンポーネント</h3>
      <p>中間サイズの画面向けの表示です。</p>
    </div>
  `
}

const PcCard = {
  template: `
    <div class="card-box pc">
      <h3>PC用コンポーネント</h3>
      <p>画面幅が広いので詳細表示です。</p>
    </div>
  `
}

const app = Vue.createApp({
  components: {
    'mobile-card': MobileCard,
    'tablet-card': TabletCard,
    'pc-card': PcCard
  },
  data() {
    return {
      width: window.innerWidth,
      deviceType: "pc"
    }
  },
  computed: {
    componentName() {
      return {
        mobile: "mobile-card",
        tablet: "tablet-card",
        pc: "pc-card"
      }[this.deviceType]
    }
  },
  methods: {
    updateDeviceType() {
      this.width = window.innerWidth

      // Bootstrap準拠ブレークポイント
      // mobile: 〜575.98
      // tablet: 576〜991.98
      // pc: 992〜
      if (window.matchMedia("(max-width: 575.98px)").matches) {
        this.deviceType = "mobile"
      } else if (window.matchMedia("(max-width: 991.98px)").matches) {
        this.deviceType = "tablet"
      } else {
        this.deviceType = "pc"
      }
    }
  },
  mounted() {
    this.updateDeviceType()
    window.addEventListener("resize", this.updateDeviceType)
  },
  beforeUnmount() {
    window.removeEventListener("resize", this.updateDeviceType)
  }
})

app.mount('#app')
</script>

</body>
</html>
