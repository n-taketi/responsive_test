<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vue Responsive Sample (Apple対応)</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
body{font-family:sans-serif;margin:20px;}
.card-box{padding:15px;border-radius:8px;border:1px solid #ccc;margin-bottom:20px;}
.mobile{background:#eef;}
.tablet{background:#ffe;}
.pc{background:#efe;}

/* ▼ CSS で現在のデバイス種別を判定する */
#device-checker::after { content: "pc"; }
@media (max-width: 991.98px) { #device-checker::after { content: "tablet"; } }
@media (max-width: 575.98px) { #device-checker::after { content: "mobile"; } }
</style>
</head>

<body>

<!-- CSS 判定用の隠し要素 -->
<div id="device-checker" style="display:none;"></div>

<div id="app">

  <h1>🍏 apple対応</h1>

  <h2>画面幅：{{ width }}px（判定：{{ deviceType }}）</h2>

  <div class="container">

    <div class="card-box" :class="deviceType">
      <h3>UI 切り替え</h3>
      <p v-if="deviceType === 'mobile'">これはスマホ向けの表示です。</p>
      <p v-else-if="deviceType === 'tablet'">これはタブレット向けの表示です。</p>
      <p v-else>これはPC向けの表示です。</p>
    </div>

    <!-- コンポーネント切り替え -->
    <component :is="componentName"></component>

  </div>

</div>

<script>
const MobileCard = {
  template: `
    <div class="card-box mobile">
      <h3>スマホ用コンポーネント</h3>
      <p>画面幅が狭いので簡易表示です。</p>
    </div>
  `
}

const TabletCard = {
  template: `
    <div class="card-box tablet">
      <h3>タブレット用コンポーネント</h3>
      <p>中間サイズの画面向けの表示です。</p>
    </div>
  `
}

const PcCard = {
  template: `
    <div class="card-box pc">
      <h3>PC用コンポーネント</h3>
      <p>画面幅が広いので詳細表示です。</p>
    </div>
  `
}

const app = Vue.createApp({
  components: {
    'mobile-card': MobileCard,
    'tablet-card': TabletCard,
    'pc-card': PcCard
  },
  data() {
    return {
      width: window.innerWidth,
      deviceType: "pc"
    }
  },
  computed: {
    componentName() {
      return {
        mobile: "mobile-card",
        tablet: "tablet-card",
        pc: "pc-card"
      }[this.deviceType]
    }
  },
  methods: {
    updateDeviceType() {
      const type = getComputedStyle(
        document.getElementById("device-checker"),
        "::after"
      ).content.replace(/"/g, "");
      this.deviceType = type;
    }
  },
  mounted() {
    this.updateDeviceType();
    window.addEventListener("resize", () => {
      this.width = window.innerWidth;
      this.updateDeviceType();
    });
  }
})

app.mount('#app')
</script>

</body>
</html>
